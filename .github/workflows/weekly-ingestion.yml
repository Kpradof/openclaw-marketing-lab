name: Weekly Ingestion and Asset Generation

on:
  schedule:
    - cron: '41 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  weekly-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai jsonschema

      - name: Run ingestion pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python ./scripts/github_repo_miner.py
          python ./scripts/repo_analyzer.py
          python ./scripts/top_candidates.py

      - name: Run asset generation pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_LIMIT: "5"
        run: |
          python ./scripts/generate_assets.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Weekly ingestion and asset generation update"
          branch: "automation/weekly-refresh"
          title: "Weekly ingestion and asset generation update"
          body: |
            Automated update generated by the weekly ingestion and asset generation workflow.

            Includes updates to:
            - research/repos.json
            - research/repo_candidates.json
            - research/top_candidates.json
            - research/openclaw_outputs/
            - skills/
            - workflows/
            - prompts/generated/
            - generated/manifest.json
          base: main
          add-paths: |
            research/repos.json
            research/repo_candidates.json
            research/top_candidates.json
            research/openclaw_outputs
            skills
            workflows
            prompts/generated
            generated/manifest.json
