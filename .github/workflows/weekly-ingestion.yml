name: Weekly Ingestion

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingestion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ingestion Pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python ./scripts/github_repo_miner.py
          python ./scripts/repo_analyzer.py
          python ./scripts/top_candidates.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Update weekly ingestion outputs"
          branch: "automation/weekly-ingestion"
          title: "Weekly ingestion outputs update"
          body: |
            Automated update generated by the weekly ingestion workflow.

            Includes updates to:
            - research/repos.json
            - research/repo_candidates.json
            - research/top_candidates.json
          base: main
          add-paths: |
            research/repos.json
            research/repo_candidates.json
            research/top_candidates.json
