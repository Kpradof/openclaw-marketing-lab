name: Generate Assets PR

on:
  push:
    paths:
      - "research/top_candidates.json"
      - "scripts/generate_assets.py"
      - "scripts/llm_analysis.py"
      - "scripts/validation.py"
      - "schemas/capability.schema.json"
      - "schemas/workflow.schema.json"
      - "schemas/prompt-pack.schema.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai jsonschema

      - name: Run asset generation pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_LIMIT: "1"
        run: |
          python ./scripts/generate_assets.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Generate validated capabilities, skills, workflows, prompts, and manifest"
          branch: "automation/generate-assets"
          title: "Generate validated capabilities, workflows, and prompts"
          body: |
            Automated update generated by the asset generation workflow.

            Includes updates to:
            - research/openclaw_outputs/
            - skills/
            - workflows/
            - prompts/generated/
            - generated/manifest.json

            Generated from:
            - research/top_candidates.json
            - scripts/generate_assets.py
            - scripts/llm_analysis.py
            - schemas/
          base: main
          add-paths: |
            research/openclaw_outputs
            skills
            workflows
            prompts/generated
            generated/manifest.json
